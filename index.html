<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정진영 | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGN IDENTITY SYSTEM (3-COLOR PALETTE) --- */
        :root {
            --bg-color: #0d0d0d;       /* 1. 메인: 매트한 딥 블랙 */
            --text-color: #ffffff;     /* 2. 서브: 클린 화이트 */
            --accent-color: #00ff66;   /* 3. 포인트: 네온 일렉트릭 그린 */
            --muted-color: #888888;    /* 보조: 쿨 슬레이트 그레이 */
            --card-bg: #1a1a1a;         /* 카드 컴포넌트용 다크 그레이 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        ::selection {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        /* 상단 네비게이션 바 */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(13, 13, 13, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 24px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent-color);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        nav ul li a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: var(--accent-color);
        }

        main {
            padding: 0 5%;
        }

        .section {
            padding: 140px 0 80px 0;
            min-height: 100vh;
        }

        /* --- SECTION 1: HERO (상단 메인 영역) --- */
        #hero {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 5%;
        }

        .hero-text {
            flex: 1.2;
        }

        .hero-text .tag {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 14px;
            color: var(--accent-color);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-block;
        }

        .hero-text h1 {
            font-size: 52px;
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: -1.5px;
            margin-bottom: 25px;
            word-break: keep-all;
        }

        .hero-text h1 span {
            color: var(--accent-color);
            display: block;
        }

        .hero-text p {
            font-size: 18px;
            color: var(--muted-color);
            max-width: 540px;
            margin-bottom: 40px;
            word-break: keep-all;
        }

        /* 내 사진 프레임 및 힙한 오프셋 박스 이펙트 */
        .hero-image-container {
            flex: 0.8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-wrapper {
            position: relative;
            width: 340px;
            height: 440px;
            background-color: var(--card-bg);
            border: 2px solid var(--text-color);
            transition: transform 0.4s ease, border-color 0.4s ease;
        }

        .profile-wrapper::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            width: 100%;
            height: 100%;
