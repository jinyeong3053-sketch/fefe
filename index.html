    <style>
        /* --- DESIGN IDENTITY SYSTEM (3-COLOR PALETTE) --- */
        :root {
            --bg-color: #0d0d0d;       /* 1. 메인: 매트한 딥 블랙 */
            --text-color: #ffffff;     /* 2. 서브: 클린 화이트 */
            --accent-color: #00ff66;   /* 3. 포인트: 네온 일렉트릭 그린 */
            --muted-color: #888888;    /* 보조: 쿨 슬레이트 그레이 */
            --card-bg: #1a1a1a;         /* 카드 컴포넌트용 다크 그레이 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            /* 영문 서체인 Montserrat를 앞으로 배치하여 영문 타이틀 폰트 깨짐 오류 수정 */
            font-family: 'Montserrat', 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 텍스트 드래그 시 힙한 네온 반전 효과 */
        ::selection {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        /* 상단 네비게이션 바 */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(13, 13, 13, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 24px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent-color);
        }
